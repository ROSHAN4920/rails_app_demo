services:
  db:
    image: postgres:14
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_development
    ports:
      - "5432:5432"

  web:
    build: .
    command: bundle exec rails server -e development -b 0.0.0.0 -p 3000
    environment:
      - RAILS_ENV=development
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  pgdata:




